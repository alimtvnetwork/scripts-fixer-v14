<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="topFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="leftFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="rightFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7e22ce"/>
    </linearGradient>
  </defs>
  <rect x="8" y="8" width="240" height="240" rx="48" fill="url(#bgB)"/>
  <!-- grid backdrop -->
  <g opacity="0.08" stroke="#38bdf8" stroke-width="1">
    <path d="M8 80 L248 80"/>
    <path d="M8 128 L248 128"/>
    <path d="M8 176 L248 176"/>
    <path d="M80 8 L80 248"/>
    <path d="M128 8 L128 248"/>
    <path d="M176 8 L176 248"/>
  </g>
  <!-- isometric cube -->
  <g transform="translate(128 128)">
    <!-- top -->
    <path d="M0 -64 L60 -32 L0 0 L-60 -32 Z" fill="url(#topFace)" stroke="#0f172a" stroke-width="2"/>
    <!-- left -->
    <path d="M-60 -32 L0 0 L0 64 L-60 32 Z" fill="url(#leftFace)" stroke="#0f172a" stroke-width="2"/>
    <!-- right -->
    <path d="M60 -32 L0 0 L0 64 L60 32 Z" fill="url(#rightFace)" stroke="#0f172a" stroke-width="2"/>
    <!-- gear on top face -->
    <g transform="translate(0 -32) scale(0.55)">
      <g fill="#fef9c3" stroke="#0f172a" stroke-width="3">
        <circle cx="0" cy="0" r="22"/>
        <g>
          <rect x="-5" y="-34" width="10" height="14" rx="2"/>
          <rect x="-5" y="20" width="10" height="14" rx="2"/>
          <rect x="-34" y="-5" width="14" height="10" rx="2"/>
          <rect x="20" y="-5" width="14" height="10" rx="2"/>
          <rect x="-5" y="-34" width="10" height="14" rx="2" transform="rotate(45)"/>
          <rect x="-5" y="-34" width="10" height="14" rx="2" transform="rotate(-45)"/>
          <rect x="-5" y="20" width="10" height="14" rx="2" transform="rotate(45)"/>
          <rect x="-5" y="20" width="10" height="14" rx="2" transform="rotate(-45)"/>
        </g>
        <circle cx="0" cy="0" r="8" fill="#0f172a" stroke="none"/>
      </g>
    </g>
  </g>
  <!-- corner spark -->
  <g transform="translate(196 60)" fill="#fde047">
    <path d="M0 -14 L4 -4 L14 0 L4 4 L0 14 L-4 4 L-14 0 L-4 -4 Z"/>
  </g>
</svg>
