<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="rocketA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <radialGradient id="flameA" cx="0.5" cy="0" r="1">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="60%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </radialGradient>
  </defs>
  <rect x="8" y="8" width="240" height="240" rx="48" fill="url(#bgA)"/>
  <!-- terminal stack lines (background) -->
  <g opacity="0.18" stroke="#ffffff" stroke-width="4" stroke-linecap="round">
    <path d="M40 60 L100 60"/>
    <path d="M40 80 L130 80"/>
    <path d="M40 200 L120 200"/>
    <path d="M40 220 L90 220"/>
    <path d="M156 200 L216 200"/>
    <path d="M136 220 L216 220"/>
  </g>
  <!-- rocket body -->
  <g transform="translate(128 128)">
    <path d="M0 -78 C26 -52 36 -22 36 8 L36 50 L-36 50 L-36 8 C-36 -22 -26 -52 0 -78 Z" fill="url(#rocketA)" stroke="#1e293b" stroke-width="3"/>
    <!-- window -->
    <circle cx="0" cy="-12" r="14" fill="#0ea5e9" stroke="#1e293b" stroke-width="3"/>
    <circle cx="-4" cy="-16" r="4" fill="#bae6fd"/>
    <!-- fins -->
    <path d="M-36 20 L-60 56 L-36 56 Z" fill="#ec4899" stroke="#1e293b" stroke-width="3"/>
    <path d="M36 20 L60 56 L36 56 Z" fill="#ec4899" stroke="#1e293b" stroke-width="3"/>
    <!-- flame -->
    <path d="M-22 50 L0 92 L22 50 Z" fill="url(#flameA)"/>
    <path d="M-12 50 L0 76 L12 50 Z" fill="#fef9c3"/>
  </g>
  <!-- sparkle stars -->
  <g fill="#ffffff">
    <circle cx="56" cy="50" r="3"/>
    <circle cx="200" cy="70" r="3"/>
    <circle cx="210" cy="160" r="2.5"/>
    <circle cx="46" cy="170" r="2.5"/>
  </g>
</svg>
