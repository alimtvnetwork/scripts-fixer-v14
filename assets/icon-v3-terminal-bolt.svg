<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#022c22"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <linearGradient id="boltC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect x="8" y="8" width="240" height="240" rx="48" fill="url(#bgC)"/>
  <!-- terminal window -->
  <rect x="32" y="44" width="192" height="168" rx="16" fill="#0f172a" stroke="#10b981" stroke-width="4"/>
  <!-- title bar -->
  <path d="M32 60 a16 16 0 0 1 16 -16 L208 44 a16 16 0 0 1 16 16 L224 76 L32 76 Z" fill="#1e293b"/>
  <circle cx="52" cy="60" r="5" fill="#ef4444"/>
  <circle cx="68" cy="60" r="5" fill="#fbbf24"/>
  <circle cx="84" cy="60" r="5" fill="#22c55e"/>
  <!-- prompt arrow -->
  <path d="M52 110 L72 126 L52 142" fill="none" stroke="#10b981" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M84 146 L160 146" stroke="#10b981" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <!-- lightning bolt overlay -->
  <g transform="translate(128 144)">
    <path d="M14 -52 L-22 8 L4 8 L-10 56 L30 -10 L4 -10 Z"
          fill="url(#boltC)" stroke="#0f172a" stroke-width="3" stroke-linejoin="round"/>
  </g>
  <!-- code dots -->
